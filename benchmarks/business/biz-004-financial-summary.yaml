expected_outputs: null

scoring_rubric: |
  Score 0.0-1.0 based on:
  - **KPI Accuracy (0.25):** Are calculations correct? Gross margin, net margin, 
    utilization rate, revenue vs. target gap, cash runway?
  - **Trend Analysis (0.20):** Q1 vs Q4 comparison? Revenue decline identified and contextualized?
    Pipeline factored into outlook?
  - **Risk Identification (0.20):** Overdue receivable flagged? Revenue below target noted?
    Cash runway calculated? Low marketing spend noted?
  - **Recommendations Quality (0.20):** Specific, actionable, tied to the data?
    Not generic advice like "increase revenue."
  - **Clarity & Format (0.15):** Easy to scan? Executive-friendly? Numbers formatted well?
