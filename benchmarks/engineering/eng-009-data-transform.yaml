id: eng-009-data-transform
category: engineering
name: "CSV to cleaned JSON pipeline"
description: "Write a data transformation pipeline that reads messy CSV data, cleans it, and outputs structured JSON."
max_turns: 12
timeout_seconds: 240.0

prompt: |
  The file `sales_data.csv` contains messy sales data with inconsistencies.

  Write `transform.py` that:
  1. Reads the CSV file
  2. Cleans the data:
     - Normalize date formats to ISO 8601 (YYYY-MM-DD)
     - Strip whitespace from all string fields
     - Convert price strings ("$1,234.56") to float (1234.56)
     - Replace empty/null values with appropriate defaults
     - Remove fully duplicate rows
     - Validate email format, mark invalid ones as null
  3. Adds computed fields:
     - `total` = quantity × price
     - `quarter` = Q1/Q2/Q3/Q4 based on date
  4. Outputs clean JSON to `output.json` with the structure:
     ```json
     {
       "metadata": {"source": "sales_data.csv", "total_records": N, "cleaned_records": N},
       "records": [...]
     }
     ```
  5. Prints a summary to stdout

  Run it with `python transform.py sales_data.csv output.json`.
  Only use stdlib (csv, json, re, datetime) — no pandas.

seed_files:
  sales_data.csv: |
    date,customer,email,product,quantity,price
    2024-01-15,  John Smith  ,john@example.com,Widget A,5,"$12.99"
    01/20/2024,Jane Doe,jane@example.com,Widget B,3,"$24.50"
    2024-02-28,John Smith,john@example.com,Widget A,5,"$12.99"
    2024-01-15,  John Smith  ,john@example.com,Widget A,5,"$12.99"
    Mar 5 2024,Bob Wilson,bob@notanemail,Gadget X,2,"$99.00"
    2024-03-15,Alice Brown,alice@company.org,Widget A,10,"$12.99"
    2024/04/01,Charlie Day,,Widget C,,"$5.50"
    2024-06-30,Diana Prince,diana@example.com,Gadget Y,1,"$1,299.99"
    July 15, 2024,Eve Adams,eve@test.com,Widget B,7,"$24.50"
    2024-09-01,Frank Ocean,frank@example.com,Widget A,3,"$12.99"
    2024-11-20,Grace Note,grace@example.com,Gadget X,4,"$99.00"
    2024-12-25,Hank Aaron,hank@example.com,Widget C,2,"$5.50"

expected_outputs: null

scoring_rubric: |
  ## Scoring Rubric (0.0-1.0)

  **Data Cleaning (40%)**
  - Date normalization to ISO 8601: +0.10
  - Price string parsing: +0.10
  - Whitespace stripping: +0.05
  - Duplicate removal: +0.05
  - Email validation: +0.05
  - Null/empty handling: +0.05

  **Computed Fields (20%)**
  - Total calculated correctly: +0.10
  - Quarter derived correctly: +0.10

  **Output (20%)**
  - Valid JSON output with metadata: +0.10
  - All records properly structured: +0.05
  - CLI interface works (reads args): +0.05

  **Code Quality (20%)**
  - Stdlib only (no pandas): +0.05
  - Handles edge cases gracefully: +0.05
  - Clean, readable functions: +0.05
  - Summary output useful: +0.05
