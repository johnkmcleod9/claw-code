id: eng-004-refactor-class
category: engineering
name: "Refactor God class into focused classes"
description: "Break a monolithic UserManager class into smaller, focused classes following single-responsibility principle."
max_turns: 15
timeout_seconds: 240.0

prompt: |
  The file `user_manager.py` contains a God class that handles authentication, profile
  management, notification sending, and activity logging — all in one class.

  Refactor it into separate classes:
  1. `Authenticator` — handles login/logout/password
  2. `ProfileManager` — handles profile CRUD
  3. `NotificationService` — handles sending notifications
  4. `ActivityLogger` — handles activity logging
  5. `UserManager` — thin facade that delegates to the above

  Put them all in a `users/` package (users/__init__.py, users/auth.py, etc.).
  Ensure the public API of UserManager is preserved (same method names, same signatures).
  Write a quick smoke test in `test_refactor.py` that imports and instantiates the new UserManager.

seed_files:
  user_manager.py: |
    """Monolithic user management — needs refactoring."""
    import hashlib
    import logging
    from datetime import datetime

    logger = logging.getLogger(__name__)


    class UserManager:
        def __init__(self, db_connection):
            self.db = db_connection
            self.sessions = {}
            self.activity_log = []
            self.notification_queue = []

        # --- Authentication ---
        def login(self, username: str, password: str) -> str | None:
            pw_hash = hashlib.sha256(password.encode()).hexdigest()
            user = self.db.find_user(username)
            if user and user.get("password_hash") == pw_hash:
                import uuid
                session_id = str(uuid.uuid4())
                self.sessions[session_id] = {"user": username, "created": datetime.now()}
                self._log_activity(username, "login")
                return session_id
            self._log_activity(username, "login_failed")
            return None

        def logout(self, session_id: str) -> bool:
            if session_id in self.sessions:
                user = self.sessions[session_id]["user"]
                del self.sessions[session_id]
                self._log_activity(user, "logout")
                return True
            return False

        def change_password(self, username: str, old_pw: str, new_pw: str) -> bool:
            old_hash = hashlib.sha256(old_pw.encode()).hexdigest()
            user = self.db.find_user(username)
            if user and user.get("password_hash") == old_hash:
                new_hash = hashlib.sha256(new_pw.encode()).hexdigest()
                self.db.update_user(username, {"password_hash": new_hash})
                self._log_activity(username, "password_changed")
                self._send_notification(username, "Your password was changed")
                return True
            return False

        # --- Profile ---
        def get_profile(self, username: str) -> dict | None:
            user = self.db.find_user(username)
            if user:
                return {k: v for k, v in user.items() if k != "password_hash"}
            return None

        def update_profile(self, username: str, updates: dict) -> bool:
            updates.pop("password_hash", None)
            self.db.update_user(username, updates)
            self._log_activity(username, "profile_updated")
            return True

        def delete_account(self, username: str) -> bool:
            self.db.delete_user(username)
            self._log_activity(username, "account_deleted")
            self._send_notification(username, "Your account has been deleted")
            return True

        # --- Notifications ---
        def _send_notification(self, username: str, message: str):
            notification = {
                "to": username,
                "message": message,
                "timestamp": datetime.now().isoformat(),
                "sent": False,
            }
            self.notification_queue.append(notification)
            logger.info(f"Notification queued for {username}: {message}")

        def get_pending_notifications(self, username: str) -> list:
            return [n for n in self.notification_queue
                    if n["to"] == username and not n["sent"]]

        def mark_notification_sent(self, index: int):
            if 0 <= index < len(self.notification_queue):
                self.notification_queue[index]["sent"] = True

        # --- Activity Logging ---
        def _log_activity(self, username: str, action: str):
            entry = {
                "user": username,
                "action": action,
                "timestamp": datetime.now().isoformat(),
            }
            self.activity_log.append(entry)
            logger.debug(f"Activity: {username} - {action}")

        def get_activity_log(self, username: str | None = None) -> list:
            if username:
                return [e for e in self.activity_log if e["user"] == username]
            return list(self.activity_log)

expected_outputs: null

