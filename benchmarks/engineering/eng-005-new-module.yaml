id: eng-005-new-module
category: engineering
name: "Build a sliding window rate limiter"
description: "Create a rate limiter module with sliding window algorithm from a specification."
max_turns: 12
timeout_seconds: 240.0

prompt: |
  Build a rate limiter module in `rate_limiter.py` with the following spec:

  ## Requirements
  - Class `RateLimiter` with sliding window algorithm
  - Constructor takes `max_requests: int` and `window_seconds: float`
  - Method `allow(key: str) -> bool` — returns True if the request is allowed, False if rate limited
  - Method `remaining(key: str) -> int` — returns remaining requests in current window
  - Method `reset(key: str)` — clears rate limit for a key
  - Thread-safe (use threading.Lock)
  - Automatically cleans up expired entries (don't leak memory)

  ## Example usage:
  ```python
  limiter = RateLimiter(max_requests=5, window_seconds=60.0)
  limiter.allow("user-123")  # True (1/5 used)
  limiter.remaining("user-123")  # 4
  ```

  Write tests in `test_rate_limiter.py` covering:
  - Basic allow/deny flow
  - Window expiration (use time mocking)
  - Multiple keys are independent
  - Thread safety
  - The remaining() method
  - The reset() method

  Run tests with `python -m pytest test_rate_limiter.py -v`.

seed_files: {}

expected_outputs: null

